<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СОГУ — Управление работами</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-default">
    <header class="top-header">
        <div class="header-left">
            <div class="university-emblem">
                <span class="emblem-icon">🎓</span>
                <span class="emblem-text">СОГУ</span>
            </div>
        </div>
        <div class="header-right">
            <div id="notificationBell" class="notification-bell">
                <span class="bell-icon">🔔</span>
                <span id="notifBadge" class="notif-badge hidden">0</span>
            </div>
            <div class="profile-mini" id="profileMini">
                <div class="profile-avatar-mini" id="profileAvatar"></div>
                <div class="profile-info-mini">
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-role" id="profileRole"></div>
                </div>
            </div>
            <div class="accessibility-buttons">
                <button id="toggleContrast" class="icon-btn" title="Переключить контраст" aria-label="Переключить контраст">👁️</button>
                <button id="increaseFont" class="icon-btn" title="Увеличить текст" aria-label="Увеличить текст">A+</button>
                <button id="decreaseFont" class="icon-btn" title="Уменьшить текст" aria-label="Уменьшить текст">A-</button>
            </div>
            <!-- Вот эта часть изменена: кнопка выхода теперь в блоке profile-mini -->
            <div class="profile-mini">
                <button id="logoutBtn" class="btn btn-outline btn-sm" style="border: none; color: white; background: transparent;">🚪 Выход</button>
            </div>
        </div>
    </header>

    <nav class="tabs-nav" id="tabsNav">
        <!-- Динамически заполняется -->
    </nav>

    <main class="main-content" id="mainContent">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>Загрузка...</p>
        </div>
    </main>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/services/toast.js"></script>
    <script src="js/services/accessibility.js"></script>
    <script src="js/services/api.service.js"></script>
    <script src="js/components/WorkList.js"></script>
    <script src="js/components/Approvals.js"></script>
    <script src="js/components/Archive.js"></script>
    <script src="js/components/CreateWorkForm.js"></script>
    <script src="js/components/Profile.js"></script>
    <script src="js/components/NotificationBell.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
